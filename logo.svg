<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F00FF" />
      <stop offset="100%" stop-color="#FF007F" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F20089" />
      <stop offset="100%" stop-color="#8900F2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" rx="16" fill="#0b0c10" />

  <!-- Grid decoration with glowing pulses -->
  <g opacity="0.06">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,250 M 200,0 L 200,250 M 300,0 L 300,250 M 400,0 L 400,250 M 500,0 L 500,250 M 600,0 L 600,250 M 700,0 L 700,250" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Animated Logo Mark (Isometric Blocks) -->
  <g>
    <!-- Overall float -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-5; 0,0" keyTimes="0; 0.5; 1"
      dur="6s" repeatCount="indefinite" additive="sum" />

    <!-- Block 1 (Top Left) -->
    <g transform="translate(60, 50)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -2,-6; 0,0" keyTimes="0; 0.5; 1"
        dur="4.5s" repeatCount="indefinite" additive="sum" />
      <!-- Left Side -->
      <path d="M0,30 L0,70 L35,90 L35,50 Z" fill="#5A189A" opacity="0.8"/>
      <!-- Right Side -->
      <path d="M35,50 L35,90 L70,70 L70,30 Z" fill="#7B2CBF" opacity="0.9"/>
      <!-- Top Side -->
      <path d="M0,30 L35,50 L70,30 L35,10 Z" fill="url(#grad1)"/>
    </g>

    <!-- Block 2 (Bottom Middle) -->
    <g transform="translate(95, 100)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 3,-8; 0,0" keyTimes="0; 0.5; 1"
        dur="5.5s" repeatCount="indefinite" additive="sum" />
      <!-- Left Side -->
      <path d="M0,30 L0,70 L35,90 L35,50 Z" fill="#03001e" opacity="0.8"/>
      <!-- Right Side -->
      <path d="M35,50 L35,90 L70,70 L70,30 Z" fill="#7303c0" opacity="0.9"/>
      <!-- Top Side -->
      <path d="M0,30 L35,50 L70,30 L35,10 Z" fill="url(#grad3)"/>
    </g>

    <!-- Block 3 (Top Right) -->
    <g transform="translate(130, 50)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -4,-4; 0,0" keyTimes="0; 0.5; 1"
        dur="6.5s" repeatCount="indefinite" additive="sum" />
      <!-- Left Side -->
      <path d="M0,30 L0,70 L35,90 L35,50 Z" fill="#0077b6" opacity="0.8"/>
      <!-- Right Side -->
      <path d="M35,50 L35,90 L70,70 L70,30 Z" fill="#0096c7" opacity="0.9"/>
      <!-- Top Side -->
      <path d="M0,30 L35,50 L70,30 L35,10 Z" fill="url(#grad2)"/>
    </g>
  </g>

  <!-- Typography using inline Presentation Attributes to prevent CSS override bugs -->
  <g transform="translate(280, 100)">
    <animateTransform attributeName="transform" type="translate"
      from="250,100" to="280,100" dur="1.2s" fill="freeze"
      calcMode="spline" keySplines="0.16, 1, 0.3, 1" />
    
    <!-- Main Title -->
    <text font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="56" fill="#ffffff" letter-spacing="2" x="0" y="20">
      Open<tspan fill="url(#grad1)">Blocks</tspan>
    </text>
    
    <!-- Subtitle -->
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-weight="500" font-size="18" fill="#c5c6c7" letter-spacing="1" x="5" y="60">
      Rust-Native MCP Server for Web Development
    </text>
  </g>
</svg>
